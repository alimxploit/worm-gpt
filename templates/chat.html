<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>XIOLIM HACK | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0c;
            color: #c0c0c5;
            height: 100vh;
            overflow: hidden;
        }
        .bg-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #14141a 0%, #050508 100%);
            z-index: -2;
        }
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(139, 58, 58, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 58, 58, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }
        .chat-header {
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid rgba(139, 58, 58, 0.4);
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #8b3a3a 0%, #5c2a2a 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #d4a0a0;
        }
        .logo h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: #d4a0a0;
        }
        .lang-toggle {
            display: flex;
            gap: 8px;
            background: rgba(30, 30, 40, 0.6);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid rgba(139, 58, 58, 0.3);
        }
        .lang-btn {
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #8a8a9a;
        }
        .lang-btn.active { background: #8b3a3a; color: #fff; }
        .btn-exit {
            background: rgba(30, 30, 40, 0.5);
            border: 1px solid rgba(139, 58, 58, 0.4);
            padding: 6px 18px;
            border-radius: 40px;
            color: #c0c0c5;
            text-decoration: none;
            font-size: 0.75rem;
        }
        .btn-exit:hover { background: #8b3a3a; border-color: #8b3a3a; color: #fff; }
        .activation-panel {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(139, 58, 58, 0.4);
            border-radius: 20px;
            max-width: 450px;
            margin: auto;
            padding: 40px;
            text-align: center;
        }
        .code-input {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .code-input input {
            flex: 1;
            background: #15151d;
            border: 1px solid #2a2a35;
            border-radius: 10px;
            padding: 12px 16px;
            color: #d4a0a0;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .code-input input:focus { outline: none; border-color: #8b3a3a; }
        .btn-primary {
            background: linear-gradient(135deg, #8b3a3a 0%, #5c2a2a 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
        }
        .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 32px 32px 32px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: #15151d; border: 1px solid #2a2a35; }
        .message.bot .message-avatar { background: #8b3a3a; color: #fff; }
        .message-content {
            padding: 10px 16px; border-radius: 12px; font-size: 0.85rem; line-height: 1.5;
        }
        .message.user .message-content { background: #8b3a3a; color: #fff; border-bottom-right-radius: 4px; }
        .message.bot .message-content { background: #15151d; border: 1px solid #2a2a35; border-bottom-left-radius: 4px; }
        .input-area { display: flex; gap: 12px; padding-top: 16px; border-top: 1px solid #2a2a35; }
        .input-area textarea {
            flex: 1; background: #15151d; border: 1px solid #2a2a35; border-radius: 12px;
            padding: 12px 18px; color: #c0c0c5; font-family: 'Inter', sans-serif;
            font-size: 0.85rem; resize: none;
        }
        .input-area textarea:focus { outline: none; border-color: #8b3a3a; }
        .btn-send { background: #8b3a3a; border: none; width: 48px; height: 48px; border-radius: 12px; color: #fff; cursor: pointer; }
        .credit-info { font-size: 0.65rem; color: #7a7a8a; text-align: right; padding: 8px 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #15151d; }
        ::-webkit-scrollbar-thumb { background: #8b3a3a; border-radius: 2px; }
        @media (max-width: 600px) {
            .chat-header { padding: 10px 16px; }
            .chat-main { padding: 0 16px 16px 16px; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
<div class="bg-dark"></div>
<div class="bg-grid"></div>
<div class="chat-container">
    <div class="chat-header">
        <div class="logo"><div class="logo-icon"><i class="fas fa-skull"></i></div><h1>XIOLIM HACK</h1></div>
        <div class="lang-toggle">
            <button class="lang-btn active" data-lang="id">🇮🇩 ID</button>
            <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        </div>
        <a href="/" class="btn-exit"><i class="fas fa-sign-out-alt"></i> Exit</a>
    </div>
    <div class="chat-main">
        <div id="activationContainer" style="flex:1; display:flex; align-items:center; justify-content:center;">
            <div class="activation-panel">
                <i class="fas fa-key" style="font-size: 2rem; color: #9b5a5a; margin-bottom: 16px;"></i>
                <h3 data-en="ACCESS ACTIVATION" data-id="AKTIVASI AKSES">AKTIVASI AKSES</h3>
                <div class="code-input">
                    <input type="text" id="accessCode" placeholder="A7F3E9B2C4D1E5F6" autocomplete="off">
                    <button class="btn-primary" onclick="redeemCode()"><i class="fas fa-unlock-alt"></i> <span data-en="Activate" data-id="Aktivasi">Aktivasi</span></button>
                </div>
                <div id="redeemResult"></div>
                <p style="margin-top: 16px; font-size:0.7rem;"><span data-en="Don't have a code?" data-id="Belum punya kode?">Belum punya kode?</span> <a href="/" style="color:#9b5a5a;">Chat owner</a></p>
            </div>
        </div>
        <div id="chatContainer" style="display:none; flex-direction:column; flex:1; height:100%;">
            <div class="messages-area" id="chatBox">
                <div class="message bot">
                    <div class="message-avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content"><strong>XIOLIM HACK</strong><br><span data-en="Ready. Ask anything." data-id="Siap. Tanya apapun.">Siap. Tanya apapun.</span></div>
                </div>
            </div>
            <div class="input-area">
                <textarea id="messageInput" rows="1" placeholder="Tanyakan apa saja... coding, DDoS, malware, exploit..."></textarea>
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="credit-info" id="creditInfo"></div>
        </div>
    </div>
</div>
<script>
    let currentCode = '', currentCredit = 0, currentLang = 'id';
    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-en][data-id]').forEach(el => {
            el.innerText = lang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-id');
        });
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
    }
    document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));
    setLanguage('id');

    async function redeemCode() {
        const code = document.getElementById('accessCode').value.trim().toUpperCase();
        if (!code) { alert(currentLang === 'en' ? 'Enter code!' : 'Masukkan kode!'); return; }
        try {
            const res = await fetch('/redeem', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ access_code: code }) });
            const data = await res.json();
            if (data.valid) {
                currentCode = code; currentCredit = data.credit;
                document.getElementById('activationContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('creditInfo').innerHTML = `💎 ${currentLang === 'en' ? 'Credit' : 'Kredit'}: ${data.credit} | Expiry: ${new Date(data.expiry).toLocaleDateString('id-ID')}`;
            } else {
                document.getElementById('redeemResult').innerHTML = `<span style="color:#b55a5a;">❌ ${currentLang === 'en' ? 'Invalid code!' : 'Kode gak valid!'}</span>`;
            }
        } catch(e) { document.getElementById('redeemResult').innerHTML = `<span style="color:#b55a5a;">Error: ${e.message}</span>`; }
    }

    async function sendMessage() {
        if (!currentCode) { alert(currentLang === 'en' ? 'Activate first!' : 'Aktivasi dulu!'); return; }
        const message = document.getElementById('messageInput').value.trim();
        if (!message) return;
        const chatBox = document.getElementById('chatBox');
        const userMsg = document.createElement('div'); userMsg.className = 'message user';
        userMsg.innerHTML = `<div class="message-avatar"><i class="fas fa-user"></i></div><div class="message-content">${escapeHtml(message)}</div>`;
        chatBox.appendChild(userMsg);
        document.getElementById('messageInput').value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
        const loading = document.createElement('div'); loading.className = 'message bot'; loading.id = 'loadingMsg';
        loading.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><i class="fas fa-spinner fa-pulse"></i> ${currentLang === 'en' ? 'Thinking...' : 'Mikir...'}</div>`;
        chatBox.appendChild(loading); chatBox.scrollTop = chatBox.scrollHeight;
        try {
            const res = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ access_code: currentCode, message }) });
            const data = await res.json();
            document.getElementById('loadingMsg')?.remove();
            const botMsg = document.createElement('div'); botMsg.className = 'message bot';
            if (data.success) {
                botMsg.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content">${escapeHtml(data.response).replace(/\n/g, '<br>')}</div>`;
                currentCredit = data.remaining_credit;
                document.getElementById('creditInfo').innerHTML = `💎 ${currentLang === 'en' ? 'Remaining' : 'Sisa'}: ${data.remaining_credit}`;
            } else {
                botMsg.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content">❌ ${escapeHtml(data.error)}</div>`;
            }
            chatBox.appendChild(botMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            document.getElementById('loadingMsg')?.remove();
            const errMsg = document.createElement('div'); errMsg.className = 'message bot';
            errMsg.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content">⚠️ ${currentLang === 'en' ? 'Connection error' : 'Gangguan koneksi'}</div>`;
            chatBox.appendChild(errMsg);
        }
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    document.getElementById('messageInput')?.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
</script>
</body>
</html>
